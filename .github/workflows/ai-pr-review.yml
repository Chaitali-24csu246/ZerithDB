name: 🤖 AI Code Review

# Uses pull_request_target so it runs with repo secrets even for fork PRs.
# We never checkout PR code here — only fetch the diff via API — so this is safe.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: Gemini AI Review
    runs-on: ubuntu-latest
    # Skip review if the PR author is the maintainer themselves
    if: github.event.pull_request.user.login != 'arpittkhandelwal'
    steps:
      - name: Fetch PR diff via GitHub API
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            > pr.diff
          echo "Diff size: $(wc -c < pr.diff) bytes, $(wc -l < pr.diff) lines"

      - name: Generate AI review via Gemini
        id: generate
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, re, sys

          # Read and truncate diff to fit Gemini context window
          with open('pr.diff', 'r', errors='replace') as f:
              diff = f.read()[:28000]

          pr_title  = os.environ.get('PR_TITLE', '')
          pr_body   = (os.environ.get('PR_BODY', '') or '')[:2000]
          pr_author = os.environ.get('PR_AUTHOR', '')
          pr_number = os.environ.get('PR_NUMBER', '')

          prompt = f"""You are a senior software engineer performing a code review for ZerithDB — an open-source TypeScript monorepo that implements a distributed, in-browser database using WebRTC P2P networking, CRDTs for conflict resolution, and IndexedDB for persistence.

PR #{pr_number} by @{pr_author}
Title: {pr_title}
Description: {pr_body}

Diff:
```diff
{diff}
```

Review this PR thoroughly. Focus on:
- Correctness and logic errors
- TypeScript type safety
- Performance implications (especially in hot paths like find(), sync, CRDT merge)
- Security concerns (especially in auth/ and network/ packages)
- Test coverage adequacy
- Code style and consistency with the codebase

Respond ONLY with valid JSON — no markdown, no extra text:
{{
  "verdict": "APPROVE" | "REQUEST_CHANGES" | "COMMENT",
  "summary": "2-3 sentence high-level assessment of the PR",
  "issues": [
    {{
      "severity": "critical" | "major" | "minor" | "nitpick",
      "file": "relative/path/to/file or empty string",
      "description": "specific, actionable description of the issue"
    }}
  ],
  "positives": ["specific things done well"],
  "key_suggestion": "the single most important improvement to make, or empty string",
  "safe_to_merge": true | false
}}

Verdict rules:
- APPROVE: no blockers, code is solid
- REQUEST_CHANGES: has critical or major issues that must be fixed
- COMMENT: only minor/nitpick issues or just observations
PYEOF

          api_key = os.environ.get('GEMINI_API_KEY', '')
          if not api_key:
              print("ERROR: GEMINI_API_KEY secret not set", file=sys.stderr)
              sys.exit(1)

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={api_key}"
          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {
                  "temperature": 0.15,
                  "maxOutputTokens": 2048,
                  "responseMimeType": "application/json"
              }
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              print(f"Gemini API error {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(1)

          text = data['candidates'][0]['content']['parts'][0]['text']

          # Parse JSON (Gemini may wrap in code fences)
          match = re.search(r'\{[\s\S]*\}', text)
          if match:
              review = json.loads(match.group())
          else:
              review = {
                  "verdict": "COMMENT",
                  "summary": text[:500],
                  "issues": [],
                  "positives": [],
                  "key_suggestion": "",
                  "safe_to_merge": False
              }

          with open('review.json', 'w') as f:
              json.dump(review, f, indent=2)

          print(f"✅ Review generated — verdict: {review.get('verdict')}, safe_to_merge: {review.get('safe_to_merge')}")
          PYEOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE:       ${{ github.event.pull_request.title }}
          PR_BODY:        ${{ github.event.pull_request.body }}
          PR_AUTHOR:      ${{ github.event.pull_request.user.login }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}

      - name: Post review comment
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os

          with open('review.json') as f:
              r = json.load(f)

          verdict    = r.get('verdict', 'COMMENT')
          summary    = r.get('summary', '')
          issues     = r.get('issues', [])
          positives  = r.get('positives', [])
          suggestion = r.get('key_suggestion', '')
          safe       = r.get('safe_to_merge', False)

          VERDICT_ICON = {'APPROVE': '✅', 'REQUEST_CHANGES': '❌', 'COMMENT': '💬'}
          SEV_ICON     = {'critical': '🔴', 'major': '🟠', 'minor': '🟡', 'nitpick': '🔵'}

          lines = [
              f"## {VERDICT_ICON.get(verdict, '💬')} AI Code Review — `{verdict}`",
              "",
              f"> {summary}",
              "",
          ]

          if positives:
              lines += ["### ✨ Strengths", ""]
              lines += [f"- {p}" for p in positives]
              lines.append("")

          if issues:
              lines += ["### 🔍 Issues Found", ""]
              for issue in issues:
                  sev  = issue.get('severity', 'minor')
                  icon = SEV_ICON.get(sev, '⚪')
                  file_ref = f" [`{issue['file']}`]" if issue.get('file') else ""
                  lines.append(f"- {icon} **{sev.upper()}**{file_ref} — {issue['description']}")
              lines.append("")

          if suggestion:
              lines += ["### 💡 Key Suggestion", "", suggestion, ""]

          merge_line = "✅ **Looks good to merge**" if safe else "⚠️ **Needs attention before merging**"
          lines += [
              "---",
              f"{merge_line}  ",
              "",
              "_🤖 Automated review by [Gemini AI](https://deepmind.google/gemini/) · ZerithDB CI Pipeline_",
          ]

          body   = "\n".join(lines)
          pr     = os.environ['PR_NUMBER']
          repo   = os.environ['GITHUB_REPOSITORY']

          result = subprocess.run(
              ['gh', 'pr', 'comment', pr, '--repo', repo, '--body', body],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"Comment post error: {result.stderr}", flush=True)
          else:
              print("✅ Review comment posted", flush=True)
          PYEOF
        env:
          GH_TOKEN:            ${{ secrets.PAT_TOKEN }}
          PR_NUMBER:           ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY:   ${{ github.repository }}

      - name: Submit formal GitHub review
        # Posts an official approve/request-changes review from the maintainer account
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os, sys

          with open('review.json') as f:
              r = json.load(f)

          verdict = r.get('verdict', 'COMMENT')
          summary = r.get('summary', 'Automated AI review completed.')
          pr      = os.environ['PR_NUMBER']
          repo    = os.environ['GITHUB_REPOSITORY']

          flag_map = {
              'APPROVE':         '--approve',
              'REQUEST_CHANGES': '--request-changes',
              'COMMENT':         '--comment',
          }
          flag = flag_map.get(verdict, '--comment')

          result = subprocess.run(
              ['gh', 'pr', 'review', pr, '--repo', repo, flag, '--body', summary],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              # Not fatal — comment was already posted
              print(f"Formal review note: {result.stderr}", flush=True)
          else:
              print(f"✅ Formal review submitted: {verdict}", flush=True)
          PYEOF
        env:
          GH_TOKEN:          ${{ secrets.PAT_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        continue-on-error: true
